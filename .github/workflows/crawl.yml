name: WordPress横断検索クローラ

on:
  schedule:
    - cron: '0 0,6,12 * * *'   # 通常クロール: 09:00 / 15:00 / 21:00 JST (差分のみ)
    - cron: '0 18 * * *'       # 削除検知: 03:00 JST (全件取り直し + DB側の孤児削除)
  workflow_dispatch:
    inputs:
      only_failed:
        description: '0件のサイトのみクロール'
        type: boolean
        default: false
      site_ids:
        description: 'カンマ区切りのサイトID (空ならonly_failedの設定に従う)'
        type: string
        default: ''
      purge_stale:
        description: '削除検知モード (全件取り直し + 孤児削除)'
        type: boolean
        default: false

# 履歴ファイルを commit するために必要
permissions:
  contents: write

jobs:
  crawl:
    name: クロール実行
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v5

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: 0件サイトのID取得 (only_failed=true 時)
        id: failed
        if: ${{ inputs.only_failed == true && inputs.site_ids == '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ids=$(curl -sS "$SUPABASE_URL/rest/v1/rpc/list_sites_with_counts" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" -d '{}' \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(','.join(s['id'] for s in d if s['count']==0))")
          echo "0件サイト: $ids"
          {
            echo "ids<<EOF"
            echo "$ids"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: クローラを実行 (Supabase書き込み)
        env:
          USE_SUPABASE: '1'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # 優先順: 手入力 site_ids > only_failed の自動抽出 > 全件
          CRAWL_ONLY_SITE_IDS: ${{ inputs.site_ids != '' && inputs.site_ids || steps.failed.outputs.ids }}
          # 削除検知モード: 手動指定 OR 03:00 JST (UTC18:00) の cron
          CRAWL_PURGE_STALE: ${{ (inputs.purge_stale == true || github.event.schedule == '0 18 * * *') && '1' || '' }}
        run: python -m app.crawler

      - name: Supabase から現在件数を取得
        id: stats
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          posts=$(curl -sS "$SUPABASE_URL/rest/v1/posts?select=count" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Prefer: count=exact" | python3 -c "import json,sys; print(json.load(sys.stdin)[0]['count'])" 2>/dev/null || echo "?")
          sites=$(curl -sS "$SUPABASE_URL/rest/v1/sites?select=count" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Prefer: count=exact" | python3 -c "import json,sys; print(json.load(sys.stdin)[0]['count'])" 2>/dev/null || echo "?")
          echo "posts=$posts" >> "$GITHUB_OUTPUT"
          echo "sites=$sites" >> "$GITHUB_OUTPUT"

      - name: 履歴ファイルを更新
        if: always()
        run: |
          mkdir -p logs
          ts=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S %Z')
          status='${{ job.status }}'
          posts='${{ steps.stats.outputs.posts }}'
          sites='${{ steps.stats.outputs.sites }}'
          echo "$ts | status=$status | sites=$sites | posts=$posts" >> logs/crawl_history.log
          # ファイルが肥大化しないよう直近500行だけ保持
          tail -n 500 logs/crawl_history.log > logs/crawl_history.log.tmp
          mv logs/crawl_history.log.tmp logs/crawl_history.log

      - name: 履歴ファイルを commit & push
        if: always()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f logs/crawl_history.log
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: クロール履歴更新 ($(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST'))"
            git push
          fi
